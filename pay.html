<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment — From Local to Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(140deg, #1e0d5e 0%, #3d1f8c 50%, #8C52FF 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      color: #1f2937;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #8C52FF;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.6rem; font-weight: 800; color: #3d1f8c;
      margin-bottom: 0.4rem; line-height: 1.2;
    }
    .sub {
      font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem;
    }
    .pay-btn {
      display: flex; align-items: center; gap: 1rem;
      width: 100%; padding: 1rem 1.25rem;
      border-radius: 10px; text-decoration: none;
      border: 2px solid #e5e7eb;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
    }
    .pay-btn:hover { border-color: #8C52FF; box-shadow: 0 4px 16px rgba(140,82,255,0.12); }
    .pay-btn img { height: 20px; width: auto; }
    .pay-btn span { font-size: 0.9rem; font-weight: 600; color: #374151; }
    .zelle-btn {
      display: flex; align-items: center; gap: 1rem;
      width: 100%; padding: 1rem 1.25rem;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      margin-bottom: 0.75rem;
      background: white;
    }
    .zelle-icon {
      height: 20px; width: 20px; border-radius: 50%;
      background: #6913d8; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: white; flex-shrink: 0;
    }
    .zelle-info { text-align: left; }
    .zelle-info .label { font-size: 0.7rem; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .zelle-info .number { font-size: 0.95rem; font-weight: 700; color: #3d1f8c; }
    .note {
      margin-top: 1.5rem; padding: 1rem;
      background: #f0ebff; border-radius: 8px;
      font-size: 0.8rem; color: #6b7280; line-height: 1.5;
    }
    .note strong { color: #3d1f8c; }
    .back {
      display: block; text-align: center; margin-top: 1.25rem;
      font-size: 0.8rem; color: #9ca3af; text-decoration: none;
    }
    .back:hover { color: #8C52FF; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">From Local to Global</div>
    <h1>Complete your payment</h1>
    <p class="sub">Choose any method below · $149 Express</p>

    <a href="https://venmo.com/u/Rumeysa-Sarikamis" target="_blank" rel="noopener" class="pay-btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Venmo_Logo.svg" alt="Venmo">
      <span>Pay via Venmo</span>
    </a>

    <a href="https://paypal.me/SarahSarikamis" target="_blank" rel="noopener" class="pay-btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
      <span>Pay via PayPal</span>
    </a>

    <a href="https://wise.com/pay/me/rumeysas30" target="_blank" rel="noopener" class="pay-btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Wise_Logo_512x124.svg" alt="Wise">
      <span>Pay via Wise</span>
    </a>

    <div class="zelle-btn">
      <div class="zelle-icon">Z</div>
      <div class="zelle-info">
        <div class="label">Zelle</div>
        <div class="number">+1 (614) 477-8377</div>
      </div>
    </div>

    <div class="note">
      <strong>After payment:</strong> Send your email address to <a href="mailto:info@localtoglobal.net" style="color:#8C52FF;">info@localtoglobal.net</a> or via WhatsApp — we'll confirm your spot manually.
    </div>

    <a href="https://localtoglobal.net/" class="back">← Back to localtoglobal.net</a>
  </div>
</body>
</html>
